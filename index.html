<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudOps Demo</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 45%, #0f172a 100%);
            color: #f8fafc;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            text-align: center;
            max-width: 760px;
            width: 90%;
            padding: 2.5rem;
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.85);
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
            border: 1px solid rgba(148, 163, 184, 0.18);
        }

        h1 {
            margin: 0 0 0.75rem;
            font-size: clamp(2.5rem, 5vw, 4rem);
            letter-spacing: -0.05em;
        }

        p {
            margin: 0;
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cbd5e1;
        }

    
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello from CloudOps 🚀</h1>
        <p>Deployment working successfully!</p>
        <h1>Updated Deployment </h1>
    </div>
</body>
</html>
